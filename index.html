<script>
/* Choix de matière très tôt, pour éviter un flash visuel au chargement. */
(function(){
  var domain = 'none';
  try{
    domain = localStorage.getItem('mtcStudyDomainChoice') || 'none';
  }catch(error){
    domain = 'none';
  }

  if(['acupuncture','pharmacology'].indexOf(domain) === -1){
    domain = 'none';
  }

  document.documentElement.setAttribute('data-study-domain', domain);
})();

</div>
